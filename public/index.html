<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Great Debate Forum</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:   #7c6dfa;
      --accent2:  #a99cff;
      --bg:       #0d0d14;
      --surface:  rgba(255,255,255,0.04);
      --border:   rgba(255,255,255,0.10);
      --text:     #e8e6f0;
      --muted:    rgba(232,230,240,0.45);
      --error:    #ff6b6b;
      --success:  #6bff95;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Main wrapper ── */
    #main {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Background ── */
    .bg {
      position: absolute; inset: 0; z-index: 1;
      background-image: url('images/background.jpg');
      background-size: auto;
      background-position: top left;
      background-repeat: no-repeat;
    }
    /* dark overlay so the card is always readable */
    .bg::after {
      content: '';
      position: absolute; inset: 0;
      z-index: 2;
      background: linear-gradient(
        160deg,
        rgba(13,13,20,0.40) 0%,
        rgba(13,13,20,0.25) 50%,
        rgba(13,13,20,0.45) 100%
      );
    }

    /* fallback glow if no image is placed yet */
    .bg-glow {
      position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 60% 55% at 50% 30%, rgba(124,109,250,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 35% at 20% 70%, rgba(169,156,255,0.10) 0%, transparent 65%),
        var(--bg);
    }

    /* ── Top band ── */
    header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      height: 56px;
      display: flex; align-items: center; padding: 0 28px;
      background: rgba(13,13,20,0.72);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .logo-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 15px; font-weight: 700; letter-spacing: .04em;
      color: var(--text);
    }
    .logo-text span { color: var(--accent2); }

    /* ── Center card ── */
    .stage {
      position: absolute; inset: 0; z-index: 15;
      display: flex; align-items: center; justify-content: flex-end;
      padding: 80px 1% 40px;
    }

    .card {
      width: 100%; max-width: 380px;
      background: rgba(13,13,20,0.78);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px 36px;
    }

    .card-title {
      font-size: 22px; font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: .01em;
    }
    .card-sub {
      font-size: 13px; color: var(--muted);
      margin-bottom: 32px;
    }

    /* ── Fields ── */
    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 12px; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input::placeholder { color: rgba(232,230,240,0.28); }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,109,250,0.18);
    }

    /* ── Button ── */
    .btn {
      width: 100%; margin-top: 10px;
      padding: 11px;
      background: var(--accent);
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 700;
      color: #fff; cursor: pointer;
      letter-spacing: .04em;
      transition: opacity .18s, transform .12s;
    }
    .btn:hover  { opacity: .88; }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .6; cursor: not-allowed; }

    .footer-note {
      text-align: center;
      margin-top: 22px;
      font-size: 12px; color: var(--muted);
    }
    .footer-note a { color: var(--accent2); text-decoration: none; cursor: pointer; }
    .footer-note a:hover { text-decoration: underline; }

    /* ── Status message ── */
    .msg {
      font-size: 13px;
      text-align: center;
      margin-bottom: 14px;
      min-height: 18px;
      display: none;
    }
    .msg.error   { color: var(--error); display: block; }
    .msg.success { color: var(--success); display: block; }
  </style>
</head>
<body>
<div id="main">

  <!-- background image layer -->
  <div class="bg"></div>
  <!-- fallback glow (shows when no image is present) -->
  <div class="bg-glow"></div>

  <header>
    <a class="logo" href="#">
      <div class="logo-icon"></div>
      <span class="logo-text">The Great <span>Debate</span> Forum</span>
    </a>
  </header>

  <div class="stage">
    <div class="card">

      <!-- LOGIN FORM -->
      <div id="loginView">
        <div class="card-title">Welcome back</div>
        <div class="card-sub">Sign in to continue the conversation</div>

        <div id="loginMsg" class="msg"></div>

        <div class="field">
          <label for="loginUsername">Username</label>
          <input id="loginUsername" type="text" placeholder="Enter your username" autocomplete="username" />
        </div>

        <div class="field">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" placeholder="Enter your password" autocomplete="current-password" />
        </div>

        <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In</button>

        <div class="footer-note">
          No account? <a onclick="showRegister()">Request access</a>
        </div>
      </div>

      <!-- REGISTER FORM (hidden by default) -->
      <div id="registerView" style="display:none;">
        <div class="card-title">Create account</div>
        <div class="card-sub">Join the conversation — pick a username</div>

        <div id="registerMsg" class="msg"></div>

        <div class="field">
          <label for="regUsername">Username</label>
          <input id="regUsername" type="text" placeholder="Choose a username" autocomplete="username" />
        </div>

        <div class="field">
          <label for="regPassword">Password</label>
          <input id="regPassword" type="password" placeholder="At least 6 characters" autocomplete="new-password" />
        </div>

        <button class="btn" id="registerBtn" onclick="handleRegister()">Create Account</button>

        <div class="footer-note">
          Already have an account? <a onclick="showLogin()">Sign in</a>
        </div>
      </div>

    </div>
  </div>

</div><!-- end #main -->

  <script>
    const loginView    = document.getElementById('loginView');
    const registerView = document.getElementById('registerView');
    const loginMsg     = document.getElementById('loginMsg');
    const registerMsg  = document.getElementById('registerMsg');

    function showRegister() {
      loginView.style.display = 'none';
      registerView.style.display = 'block';
      registerMsg.className = 'msg';
      registerMsg.textContent = '';
    }

    function showLogin() {
      registerView.style.display = 'none';
      loginView.style.display = 'block';
      loginMsg.className = 'msg';
      loginMsg.textContent = '';
    }

    function setMsg(el, text, type) {
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    async function handleLogin() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');

      if (!username || !password) {
        setMsg(loginMsg, 'Please fill in both fields.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok) {
          setMsg(loginMsg, data.error || 'Login failed.', 'error');
        } else {
          setMsg(loginMsg, `Welcome, ${data.username}! Redirecting...`, 'success');
          setTimeout(() => { window.location.href = '/dashboard'; }, 800);
        }
      } catch (err) {
        setMsg(loginMsg, 'Could not reach server. Try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    async function handleRegister() {
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value;
      const btn = document.getElementById('registerBtn');

      if (!username || !password) {
        setMsg(registerMsg, 'Please fill in both fields.', 'error');
        return;
      }
      if (password.length < 6) {
        setMsg(registerMsg, 'Password must be at least 6 characters.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await fetch('/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok) {
          setMsg(registerMsg, data.error || 'Registration failed.', 'error');
        } else {
          setMsg(registerMsg, 'Account created! You can sign in now.', 'success');
          setTimeout(showLogin, 1200);
        }
      } catch (err) {
        setMsg(registerMsg, 'Could not reach server. Try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    // allow Enter key to submit the visible form
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (registerView.style.display !== 'none') {
        handleRegister();
      } else {
        handleLogin();
      }
    });
  </script>

</body>
</html>
